<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>DeFi Trade Dashboard</h1>
    <p>Welcome Trader</p>
</header>

<div class="container">

<div class="card">
    <h2>Wallet Balance</h2>
    <h1>1000 USDT</h1>
</div>

<div class="card">
    <h2>BTC / USDT</h2>
    <h1 id="btc">$0.00</h1>
</div>

<div class="card">
    <h2>ETH / USDT</h2>
    <h1 id="eth">$0.00</h1>
</div>

<div class="card">
    <h2>SOL / USDT</h2>
    <h1 id="sol">$0.00</h1>
</div>

<button onclick="location.href='trade.html'">
Start 60s Trade
</button>

<br><br>

<button onclick="location.href='portfolio.html'">
Portfolio
</button>

</div>

<script src="app.js"></script>
<div class="trade-box">

<h2>60 Second Trade</h2>

<p>BTC Price: $<span id="price">60000</span></p>

<h3>Time Left: <span id="timer">60</span>s</h3>

<button onclick="startTrade('UP')">
UP 📈
</button>

<button onclick="startTrade('DOWN')">
DOWN 📉
</button>

<p id="result"></p>

</div>


<script src="trade.js"></script>
<div class="chat-box">

<h3>Live Chat 💬</h3>

<div id="messages" 
style="height:200px; overflow:auto;">
</div>


<input 
id="chatInput" 
placeholder="Write message..."
>


<button onclick="sendMessage()">
Send
</button>


</div>


<script src="chat.js"></script>
<div class="wallet">

<h2>Wallet 💰</h2>

<p>
Balance: $<span id="balance">Loading...</span>
</p>


<input 
id="amount"
type="number"
placeholder="Trade amount"
>


<button onclick="trade('win')">
UP Trade
</button>


<button onclick="trade('loss')">
DOWN Trade
</button>


<p id="tradeResult"></p>

</div>


<script src="wallet.js"></script>

</body>
</html>
